<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lost & Found</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: white;
    z-index: 10;
    font-size: 18px;
    text-shadow: 0 0 10px black;
}

#crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
}

#message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00ff99;
    font-size: 32px;
    display: none;
    z-index: 20;
    text-align: center;
    text-shadow: 0 0 20px black;
}

#tapeScreen {

    position: absolute;
    inset: 0;

    background: rgba(0,0,0,0.96);

    display: none;

    align-items: center;
    justify-content: center;

    flex-direction: column;

    color: #00ff99;

    font-size: 32px;

    text-align: center;

    z-index: 30;

    overflow: hidden;
}

#static {

    position: absolute;
    inset: 0;

    background-image:
    repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 2px,
        transparent 2px,
        transparent 4px
    );

    animation: staticMove 0.08s infinite;

    pointer-events: none;
}

@keyframes staticMove {

    0% {
        opacity: 0.08;
    }

    50% {
        opacity: 0.18;
    }

    100% {
        opacity: 0.08;
    }
}

#flash {

    position: fixed;

    top: 0;
    left: 0;

    width: 100vw;
    height: 100vh;

    background: white;

    opacity: 0;

    pointer-events: none;

    z-index: 9999;

    transition: opacity 1.5s;
}

</style>
</head>

<body>

<div id="crosshair"></div>

<div id="ui">
    WASD = Move<br>
    Mouse = Look<br>
    E = Collect Tape
</div>

<div id="message"></div>

<div id="flash"></div>

<div id="tapeScreen">

    <div id="tapeText"></div>

    <br><br>

    <div style="color:white;font-size:18px;">
        Press SPACE to close
    </div>

    <div id="static"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;

scene = new THREE.Scene();

scene.background = new THREE.Color(0x080808);

scene.fog = new THREE.Fog(
    0x000000,
    8,
    32
);

camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

renderer = new THREE.WebGLRenderer();

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

camera.position.set(0, 2, 8);

const ambientLight =
    new THREE.AmbientLight(
        0xffffff,
        0.5
    );

scene.add(ambientLight);

const hallwayLight =
    new THREE.PointLight(
        0xffcc88,
        2,
        25
    );

hallwayLight.position.set(0, 6, 0);

scene.add(hallwayLight);

const flickerLight =
    new THREE.PointLight(
        0xffffcc,
        1,
        18
    );

flickerLight.position.set(0, 5, -10);

scene.add(flickerLight);

const floor = new THREE.Mesh(

    new THREE.PlaneGeometry(60, 60),

    new THREE.MeshStandardMaterial({
        color: 0x333333
    })
);

floor.rotation.x = -Math.PI / 2;

scene.add(floor);

const colliders = [];

function wall(x, y, z, w, h, d) {

    const mesh = new THREE.Mesh(

        new THREE.BoxGeometry(w, h, d),

        new THREE.MeshStandardMaterial({
            color: 0x222222
        })
    );

    mesh.position.set(x, y, z);

    scene.add(mesh);

    const box =
        new THREE.Box3().setFromObject(mesh);

    colliders.push(box);

    return mesh;
}

wall(0, 3, -20, 20, 6, 1);

wall(-10, 3, 0, 1, 6, 40);

wall(10, 3, 0, 1, 6, 40);

wall(-5, 3, -10, 6, 6, 1);

wall(5, 3, -10, 6, 6, 1);

const tapes = [];

function createTape(x, y, z, text) {

    const tape = new THREE.Mesh(

        new THREE.BoxGeometry(
            0.5,
            0.3,
            0.8
        ),

        new THREE.MeshStandardMaterial({
            color: 0x000000
        })
    );

    tape.position.set(x, y, z);

    tape.userData.clue = text;

    scene.add(tape);

    tapes.push(tape);
}

createTape(
    -6,
    1,
    -5,
    "EMPLOYEE EXIT CODE: 4132"
);

createTape(
    6,
    1,
    -14,
    "THE FIGURE IS WATCHING."
);

createTape(
    0,
    1,
    -18,
    "RUN."
);

const monster = new THREE.Mesh(

    new THREE.BoxGeometry(
        1.5,
        4,
        1
    ),

    new THREE.MeshStandardMaterial({
        color: 0x000000
    })
);

monster.position.set(0, 2, -30);

scene.add(monster);

let yaw = 0;
let pitch = 0;

document.body.addEventListener(
    "click",
    () => {
        document.body.requestPointerLock();
    }
);

document.addEventListener(
    "mousemove",
    e => {

        if (
            document.pointerLockElement ===
            document.body
        ) {

            yaw -= e.movementX * 0.002;

            pitch -= e.movementY * 0.002;

            pitch = Math.max(
                -Math.PI / 2,
                Math.min(
                    Math.PI / 2,
                    pitch
                )
            );

            camera.rotation.order = "YXZ";

            camera.rotation.y = yaw;

            camera.rotation.x = pitch;
        }
    }
);

const keys = {};

window.addEventListener(
    "keydown",
    e => {

        keys[e.code] = true;

        if (e.code === "KeyE") {
            interact();
        }

        if (e.code === "Space") {

            document.getElementById(
                "tapeScreen"
            ).style.display = "none";
        }
    }
);

window.addEventListener(
    "keyup",
    e => {
        keys[e.code] = false;
    }
);

function movement() {

    const speed = 0.12;

    const oldPosition =
        camera.position.clone();

    const direction =
        new THREE.Vector3();

    camera.getWorldDirection(direction);

    direction.y = 0;

    direction.normalize();

    const right =
        new THREE.Vector3();

    right.crossVectors(
        camera.up,
        direction
    ).normalize();

    if (keys["KeyW"]) {

        camera.position.add(
            direction.clone()
            .multiplyScalar(speed)
        );
    }

    if (keys["KeyS"]) {

        camera.position.add(
            direction.clone()
            .multiplyScalar(-speed)
        );
    }

    if (keys["KeyA"]) {

        camera.position.add(
            right.clone()
            .multiplyScalar(speed)
        );
    }

    if (keys["KeyD"]) {

        camera.position.add(
            right.clone()
            .multiplyScalar(-speed)
        );
    }

    const playerBox =
        new THREE.Box3().setFromCenterAndSize(

            camera.position,

            new THREE.Vector3(
                1,
                3,
                1
            )
        );

    for (const collider of colliders) {

        if (playerBox.intersectsBox(collider)) {

            camera.position.copy(oldPosition);
        }
    }

    camera.position.y = 2;
}

function interact() {

    const raycaster =
        new THREE.Raycaster();

    raycaster.setFromCamera(
        new THREE.Vector2(0,0),
        camera
    );

    const hits =
        raycaster.intersectObjects(tapes);

    if (hits.length > 0) {

        const tape = hits[0].object;

        if (
            camera.position.distanceTo(
                tape.position
            ) < 3
        ) {

            scene.remove(tape);

            tapes.splice(
                tapes.indexOf(tape),
                1
            );

            showTape(
                tape.userData.clue
            );

            flashScreen();

            if (
                tape.userData.clue ===
                "THE FIGURE IS WATCHING."
            ) {

                monster.position.z = -10;
            }

            if (
                tape.userData.clue ===
                "RUN."
            ) {

                monster.position.z =
                    camera.position.z - 6;
            }

            if (tapes.length === 0) {

                showMessage(
                    "THE EXIT IS OPEN"
                );
            }
        }
    }
}

function showTape(text) {

    document.getElementById(
        "tapeScreen"
    ).style.display = "flex";

    document.getElementById(
        "tapeText"
    ).innerHTML = text;
}

function showMessage(text) {

    const msg =
        document.getElementById("message");

    msg.innerHTML = text;

    msg.style.display = "block";

    setTimeout(() => {

        msg.style.display = "none";

    }, 3000);
}

function flashScreen() {

    const flash =
        document.getElementById("flash");

    flash.style.opacity = "0.8";

    setTimeout(() => {

        flash.style.opacity = "0";

    }, 50);
}

function flickerLights() {

    hallwayLight.intensity =
        1.5 + Math.random() * 1.5;

    flickerLight.intensity =
        0.5 + Math.random() * 1.5;
}

function animateMonster() {

    const dist =
        camera.position.distanceTo(
            monster.position
        );

    if (dist < 15) {

        monster.lookAt(
            camera.position
        );
    }

    if (dist < 8) {

        const dir =
            new THREE.Vector3();

        dir.subVectors(
            camera.position,
            monster.position
        ).normalize();

        monster.position.add(
            dir.multiplyScalar(0.015)
        );
    }

    if (dist < 3) {

        showMessage(
            "IT FOUND YOU"
        );
    }
}

function randomMonsterFlash() {

    if (Math.random() < 0.002) {

        monster.visible = true;

        setTimeout(() => {

            monster.visible = false;

        }, 300);
    }
}

monster.visible = false;

function animate() {

    requestAnimationFrame(
        animate
    );

    movement();

    animateMonster();

    flickerLights();

    randomMonsterFlash();

    renderer.render(
        scene,
        camera
    );
}

animate();

window.addEventListener(
    "resize",
    () => {

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

</script>

</body>
</html>
