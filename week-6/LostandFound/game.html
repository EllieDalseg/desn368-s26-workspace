<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost & Found</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="crosshair"></div>

<div id="ui">
    WASD = Move<br>
    SHIFT = Sprint<br>
    E = Interact
</div>

<div id="staminaContainer">
    <div id="staminaBar"></div>
</div>

<div id="inventory">
    <div class="slot" id="slot1">EMPTY</div>
    <div class="slot" id="slot2">EMPTY</div>
</div>

<div id="message"></div>

<div id="flash"></div>

<div id="tapeScreen" style="display:none;">

    <img id="tapeImage"
    src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">

    <div id="tapeText"></div>

    <br><br>

    <div style="color:white;font-size:18px;">
        Press SPACE to close
    </div>

    <div id="static"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="script.js"></script>

</body>
</html>
