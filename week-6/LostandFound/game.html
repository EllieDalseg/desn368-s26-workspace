<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lost & Found</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: white;
    z-index: 10;
    font-size: 18px;
}

#crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
}

#message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00ff99;
    font-size: 32px;
    display: none;
    z-index: 20;
    text-align: center;
}

#tapeScreen {

    position: absolute;
    inset: 0;

    background: rgba(0,0,0,0.95);

    display: none;

    align-items: center;
    justify-content: center;

    flex-direction: column;

    color: #00ff99;

    font-size: 32px;

    text-align: center;

    z-index: 30;
}

</style>
</head>

<body>

<div id="crosshair"></div>

<div id="ui">
    WASD = Move<br>
    Mouse = Look<br>
    E = Collect Tape
</div>

<div id="message"></div>

<div id="tapeScreen">
    <div id="tapeText"></div>

    <br><br>

    <div style="color:white;font-size:18px;">
        Press SPACE to close
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;

scene = new THREE.Scene();

scene.background = new THREE.Color(0x111111);

scene.fog = new THREE.Fog(
    0x000000,
    10,
    45
);

camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

renderer = new THREE.WebGLRenderer();

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

camera.position.set(0, 2, 8);

const ambientLight =
    new THREE.AmbientLight(
        0xffffff,
        1.2
    );

scene.add(ambientLight);

const pointLight =
    new THREE.PointLight(
        0xffcc88,
        2,
        30
    );

pointLight.position.set(0, 6, 0);

scene.add(pointLight);

const floor = new THREE.Mesh(

    new THREE.PlaneGeometry(60, 60),

    new THREE.MeshStandardMaterial({
        color: 0x333333
    })
);

floor.rotation.x = -Math.PI / 2;

scene.add(floor);

function wall(x, y, z, w, h, d) {

    const mesh = new THREE.Mesh(

        new THREE.BoxGeometry(w, h, d),

        new THREE.MeshStandardMaterial({
            color: 0x222222
        })
    );

    mesh.position.set(x, y, z);

    scene.add(mesh);

    return mesh;
}

wall(0, 3, -20, 20, 6, 1);

wall(-10, 3, 0, 1, 6, 40);

wall(10, 3, 0, 1, 6, 40);

wall(-5, 3, -10, 6, 6, 1);

wall(5, 3, -10, 6, 6, 1);

const tapes = [];

function createTape(x, y, z, text) {

    const tape = new THREE.Mesh(

        new THREE.BoxGeometry(
            0.5,
            0.3,
            0.8
        ),

        new THREE.MeshStandardMaterial({
            color: 0x000000
        })
    );

    tape.position.set(x, y, z);

    tape.userData.clue = text;

    scene.add(tape);

    tapes.push(tape);
}

createTape(
    -6,
    1,
    -5,
    "EMPLOYEE EXIT CODE: 4132"
);

createTape(
    6,
    1,
    -14,
    "THE FIGURE IS WATCHING."
);

createTape(
    0,
    1,
    -18,
    "RUN."
);

const monster = new THREE.Mesh(

    new THREE.BoxGeometry(
        1.5,
        4,
        1
    ),

    new THREE.MeshStandardMaterial({
        color: 0x000000
    })
);

monster.position.set(0, 2, -25);

scene.add(monster);

let yaw = 0;
let pitch = 0;

document.body.addEventListener(
    "click",
    () => {
        document.body.requestPointerLock();
    }
);

document.addEventListener(
    "mousemove",
    e => {

        if (
            document.pointerLockElement ===
            document.body
        ) {

            yaw -= e.movementX * 0.002;

            pitch -= e.movementY * 0.002;

            pitch = Math.max(
                -Math.PI / 2,
                Math.min(
                    Math.PI / 2,
                    pitch
                )
            );

            camera.rotation.order = "YXZ";

            camera.rotation.y = yaw;

            camera.rotation.x = pitch;
        }
    }
);

const keys = {};

window.addEventListener(
    "keydown",
    e => {

        keys[e.code] = true;

        if (e.code === "KeyE") {
            interact();
        }

        if (e.code === "Space") {

            document.getElementById(
                "tapeScreen"
            ).style.display = "none";
        }
    }
);

window.addEventListener(
    "keyup",
    e => {
        keys[e.code] = false;
    }
);

function movement() {

    const speed = 0.12;

    const direction =
        new THREE.Vector3();

    camera.getWorldDirection(direction);

    const right =
        new THREE.Vector3();

    right.crossVectors(
        direction,
        camera.up
    );

    if (keys["KeyW"]) {

        camera.position.add(
            direction.clone()
            .multiplyScalar(speed)
        );
    }

    if (keys["KeyS"]) {

        camera.position.add(
            direction.clone()
            .multiplyScalar(-speed)
        );
    }

if (keys["KeyA"]) {

    camera.position.add(
        right.clone()
        .multiplyScalar(-speed)
    );
}

if (keys["KeyD"]) {

    camera.position.add(
        right.clone()
        .multiplyScalar(speed)
    );
}


function interact() {

    const raycaster =
        new THREE.Raycaster();

    raycaster.setFromCamera(
        new THREE.Vector2(0,0),
        camera
    );

    const hits =
        raycaster.intersectObjects(tapes);

    if (hits.length > 0) {

        const tape = hits[0].object;

        if (
            camera.position.distanceTo(
                tape.position
            ) < 3
        ) {

            scene.remove(tape);

            tapes.splice(
                tapes.indexOf(tape),
                1
            );

            showTape(
                tape.userData.clue
            );

            if (
                tape.userData.clue ===
                "THE FIGURE IS WATCHING."
            ) {

                monster.position.z = -10;
            }
        }
    }
}

function showTape(text) {

    document.getElementById(
        "tapeScreen"
    ).style.display = "flex";

    document.getElementById(
        "tapeText"
    ).innerHTML = text;
}

function animateMonster() {

    const dist =
        camera.position.distanceTo(
            monster.position
        );

    if (dist < 12) {

        monster.lookAt(
            camera.position
        );
    }

    if (dist < 8) {

        const dir =
            new THREE.Vector3();

        dir.subVectors(
            camera.position,
            monster.position
        ).normalize();

        monster.position.add(
            dir.multiplyScalar(0.01)
        );
    }
}

function animate() {

    requestAnimationFrame(
        animate
    );

    movement();

    animateMonster();

    renderer.render(
        scene,
        camera
    );
}

animate();

window.addEventListener(
    "resize",
    () => {

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

</script>

</body>
</html>
